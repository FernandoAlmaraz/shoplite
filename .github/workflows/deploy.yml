name: Deploy ShopLite to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write  # Necesario para hacer push a la rama gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Instala Node.js v20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shoplite-frontend/package-lock.json

      # 3. Instala dependencias
      - name: Install Dependencies
        working-directory: shoplite-frontend
        run: npm ci

      # 4. Build de producción con base-href correcto
      - name: Build Angular App
        working-directory: shoplite-frontend
        run: npm run build -- --base-href /shoplite/

      # 5. Deploy a la rama gh-pages
      # Este action hace push de la carpeta dist a la rama gh-pages automáticamente
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: shoplite-frontend/dist/shoplite-frontend/browser
          branch: gh-pages
          clean: true  # Limpia archivos viejos antes de subir los nuevos
