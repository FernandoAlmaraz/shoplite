name: Deploy ShopLite to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shoplite-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: shoplite-frontend
        run: npm ci

      - name: Build Angular App
        working-directory: shoplite-frontend
        run: npm run build -- --base-href /shoplite/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: shoplite-frontend/dist/shoplite-frontend/browser/

  deploy:
    needs: build-and-deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
