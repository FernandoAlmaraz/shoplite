name: Deploy ShopLite to GitHub Pages

on:
  push:
    branches:
      - main  # Dispara el deploy cada vez que haces git push a main

# Permisos necesarios para que el Action pueda escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Instala Node.js v20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shoplite-frontend/package-lock.json

      # 3. Instala las dependencias del proyecto Angular
      - name: Install Dependencies
        working-directory: shoplite-frontend
        run: npm ci

      # 4. Hace el build de Angular en modo producción
      # IMPORTANTE: El base-href debe coincidir exactamente con el nombre del repo
      - name: Build Angular App
        working-directory: shoplite-frontend
        run: npm run build -- --base-href /shoplite/

      # 5. Configura GitHub Pages (enablement: true lo activa automáticamente)
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      # 6. Sube el resultado del build como artifact de Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # La carpeta dist de Angular con el nuevo builder (@angular/build:application)
          path: 'shoplite-frontend/dist/shoplite-frontend/browser'

      # 7. Despliega en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
