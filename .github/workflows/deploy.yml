name: Deploy ShopLite to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shoplite-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: shoplite-frontend
        run: npm ci

      - name: Build Angular App
        working-directory: shoplite-frontend
        run: npm run build -- --base-href /shoplite/

      # Copia el build a la carpeta /docs en la raíz del repo
      - name: Copy dist to /docs
        run: |
          rm -rf docs
          cp -r shoplite-frontend/dist/shoplite-frontend/browser docs

      # Hace commit de la carpeta /docs al branch main
      - name: Commit and Push /docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "ci: update /docs build [skip ci]"
          git push origin main
