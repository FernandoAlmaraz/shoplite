<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ShopLite</title>
    <script type="text/javascript">
      // Truco para GitHub Pages + Angular: redirige al index.html pasando
      // la ruta actual como parámetro para que Angular Router la maneje.
      var pathSegmentsToKeep = 1; // número de segmentos del repositorio en la URL (/shoplite/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
