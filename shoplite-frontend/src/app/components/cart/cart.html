<div class="container fade-in">
  <header class="cart-header">
    <h1>Tu Carrito</h1>
    <button *ngIf="cartService.count() > 0" 
            (click)="onClearCart()" 
            class="clear-btn"
            [class.pulsing]="isClearing()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
      Vaciar Carrito
    </button>
  </header>

  <div *ngIf="cartService.count() > 0 || isClearing(); else emptyState" class="cart-content" [@listAnim]="cartService.count()">
    <div class="cart-items">
      <div *ngFor="let item of cartService.cartItems(); let i = index" 
           class="cart-item" 
           @itemAnim>
        <img [src]="item.image" [alt]="item.name" class="item-img">
        <div class="item-info">
          <h3>{{ item.name }}</h3>
          <p class="item-cat">{{ item.category }}</p>
        </div>
        <span class="item-price">Bs. {{ item.price }}</span>
        <button (click)="onRemove(i)" 
                class="remove-btn" 
                [class.shake]="shakingIndex() === i"
                aria-label="Eliminar">
          <svg class="trash-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path class="trash-lid" d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            <path class="trash-lid" d="M3 6h18"></path>
            <path class="trash-body" d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
            <line class="trash-line" x1="10" y1="11" x2="10" y2="17"></line>
            <line class="trash-line" x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
      </div>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span>Bs. {{ cartService.total() }}</span>
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span>Bs. {{ cartService.total() }}</span>
      </div>
      <button class="checkout-btn">Finalizar Compra</button>
    </div>
  </div>

  <ng-template #emptyState>
    <div *ngIf="showEmptyState()" class="empty-cart" @fadeAnim>
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <p>Tu carrito está vacío actualmente.</p>
      <button routerLink="/products" class="back-btn">Ir a la tienda</button>
    </div>
  </ng-template>
</div>
