<header class="header">
  <div class="header-brand">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <path d="M16 10a4 4 0 0 1-8 0"></path>
    </svg>
    <span class="brand-name">ShopLite</span>
  </div>

  <nav class="nav-desktop">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/products" routerLinkActive="active">Productos</a>
    <a routerLink="/offers" routerLinkActive="active">Ofertas</a>
    <a routerLink="/cart" routerLinkActive="active" class="nav-cart">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      Carrito
    </a>
  </nav>

  <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Menú">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-mobile" [class.open]="menuOpen" (click)="closeMenu()">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/products" routerLinkActive="active">Productos</a>
    <a routerLink="/offers" routerLinkActive="active">Ofertas</a>
    <a routerLink="/cart" routerLinkActive="active">Carrito</a>
  </div>
</header>
